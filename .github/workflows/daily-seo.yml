name: Daily SEO Content

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 14:00 Taipei
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Generate SEO content
        run: python scripts/generate_content.py

      - name: Commit changes to main
        run: |
          git config user.name "hermes-agent"
          git config user.email "hermes@nousresearch.com"
          git add _posts/ docs/ data/
          git diff --staged --quiet || {
            git commit -m "auto: daily SEO content update $(date +%Y-%m-%d)"
            git push
          }

      - name: Deploy docs to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          keep_files: false
